<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 5 Connections</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="badge">Grade 5</div>
  <h1>Connections</h1>
  <p>Find 4 groups of 5 words that belong together!</p>
</header>

<div class="puzzle-tabs" id="puzzle-tabs"></div>

<div id="game-area">
  <div id="loading">Loading puzzles...</div>
</div>

<script>
const COLORS = {
  purple: { bg: "var(--purple-bg)", border: "var(--purple-border)", text: "var(--purple-text)" },
  teal:   { bg: "var(--teal-bg)",   border: "var(--teal-border)",   text: "var(--teal-text)"   },
  amber:  { bg: "var(--amber-bg)",  border: "var(--amber-border)",  text: "var(--amber-text)"  },
  coral:  { bg: "var(--coral-bg)",  border: "var(--coral-border)",  text: "var(--coral-text)"  },
  green:  { bg: "var(--green-bg)",  border: "var(--green-border)",  text: "var(--green-text)"  },
  blue:   { bg: "var(--blue-bg)",   border: "var(--blue-border)",   text: "var(--blue-text)"   },
};

let PUZZLES = [];
let puzzleIdx = 0, cards = [], selected = [], solvedCats = [];
let mistakes = 4, score = 0, gameOver = false;
const completedPuzzles = new Set();

fetch("puzzles.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(data => { PUZZLES = data; buildGameUI(); initPuzzle(0); })
  .catch(err => {
    document.getElementById("game-area").innerHTML =
      `<div id="error"><strong>Could not load puzzles.json</strong><br><small>${err.message}</small><br><br>
       Make sure <code>puzzles.json</code> is in the same folder as this HTML file,<br>
       and open via a local server (or use VS Code Live Server).</div>`;
  });

function buildGameUI() {
  document.getElementById("game-area").innerHTML = `
    <div id="status-row">
      <div id="score-display">Score: <span id="score">0</span></div>
      <div id="mistakes-area">
        Mistakes left:
        <span class="dot" id="d0"></span><span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span><span class="dot" id="d3"></span>
      </div>
    </div>
    <div id="solved-area"></div>
    <div id="grid"></div>
    <div id="msg"></div>
    <div id="btn-row">
      <button id="btn-shuffle">Shuffle</button>
      <button id="btn-deselect">Clear</button>
      <button id="btn-submit" disabled>Submit (0/5)</button>
    </div>`;
  document.getElementById("btn-deselect").addEventListener("click", () => { selected = []; render(); });
  document.getElementById("btn-shuffle").addEventListener("click", () => {
    const unsolved = cards.filter(c => !solvedCats.includes(c.cat));
    cards = [...cards.filter(c => solvedCats.includes(c.cat)), ...shuffle(unsolved)];
    render();
  });
  document.getElementById("btn-submit").addEventListener("click", submitGuess);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initPuzzle(idx) {
  puzzleIdx = idx; selected = []; solvedCats = [];
  mistakes = 4; gameOver = false;
  cards = shuffle(PUZZLES[idx].categories.flatMap(c => c.items.map(item => ({ item, cat: c }))));
  renderTabs(); render();
}

function renderTabs() {
  const tabs = document.getElementById("puzzle-tabs");
  tabs.innerHTML = "";
  PUZZLES.forEach((_, i) => {
    const t = document.createElement("button");
    t.className = "tab" + (i === puzzleIdx ? " active" : "") + (completedPuzzles.has(i) && i !== puzzleIdx ? " done" : "");
    t.textContent = i + 1;
    t.addEventListener("click", () => { score = 0; initPuzzle(i); });
    tabs.appendChild(t);
  });
}

function render() {
  document.getElementById("score").textContent = score;
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById("d" + i);
    if (d) d.className = "dot" + (i >= mistakes ? " used" : "");
  }

  const solvedArea = document.getElementById("solved-area");
  solvedArea.innerHTML = "";
  solvedCats.forEach(cat => {
    const c = COLORS[cat.color] || COLORS.purple;
    const row = document.createElement("div");
    row.className = "solved-row";
    row.style.background = c.bg;
    row.style.borderColor = c.border;
    row.style.color = c.text;
    row.innerHTML = `<div class="cat-name">${cat.name}</div><div class="cat-items">${cat.items.join(" \u00b7 ")}</div>`;
    solvedArea.appendChild(row);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  cards.filter(c => !solvedCats.includes(c.cat)).forEach(({ item }) => {
    const card = document.createElement("div");
    card.className = "card" + (selected.includes(item) ? " selected" : "");
    card.textContent = item;
    card.addEventListener("click", () => toggleSelect(item));
    grid.appendChild(card);
  });

  const btn = document.getElementById("btn-submit");
  btn.disabled = selected.length !== 5 || gameOver;
  btn.textContent = "Submit (" + selected.length + "/5)";
}

function toggleSelect(item) {
  if (gameOver) return;
  if (selected.includes(item)) {
    selected = selected.filter(s => s !== item);
  } else if (selected.length < 5) {
    selected.push(item);
  } else {
    flashMsg("Select exactly 5 words.", "var(--coral-text)");
    return;
  }
  render();
}

function submitGuess() {
  if (selected.length !== 5 || gameOver) return;
  const cats = selected.map(item => cards.find(c => c.item === item).cat);
  const allSame = cats.every(c => c === cats[0]);

  if (allSame) {
    solvedCats.push(cats[0]);
    score += mistakes === 4 ? 3 : mistakes >= 2 ? 2 : 1;
    selected = [];
    flashMsg("Correct! " + cats[0].name, "var(--teal-text)");
    render();
    if (solvedCats.length === PUZZLES[puzzleIdx].categories.length) setTimeout(() => endGame(true), 350);
  } else {
    const counts = cats.reduce((m, c) => { m[c.name] = (m[c.name] || 0) + 1; return m; }, {});
    const close = Object.values(counts).some(v => v === 4);
    mistakes--;
    document.querySelectorAll(".card.selected").forEach(el => {
      el.classList.add("shake");
      setTimeout(() => el.classList.remove("shake"), 400);
    });
    selected = [];
    flashMsg(
      close ? "So close \u2014 one away! Try again." : "Not quite! " + mistakes + " mistake" + (mistakes !== 1 ? "s" : "") + " left.",
      close ? "var(--amber-text)" : "var(--coral-text)"
    );
    if (mistakes === 0) { setTimeout(() => endGame(false), 450); } else { render(); }
  }
}

function flashMsg(txt, color) {
  const el = document.getElementById("msg");
  el.textContent = txt;
  el.style.color = color || "var(--muted)";
}

function endGame(won) {
  gameOver = true;
  if (won) completedPuzzles.add(puzzleIdx);
  PUZZLES[puzzleIdx].categories.filter(c => !solvedCats.includes(c)).forEach(c => solvedCats.push(c));
  render(); renderTabs();
  const btnRow = document.getElementById("btn-row");
  btnRow.querySelectorAll(".btn-next, .btn-restart").forEach(b => b.remove());
  flashMsg(won ? "Great job! Score: " + score + " pts" : "Game over! Score: " + score + " pts",
           won ? "var(--teal-text)" : "var(--coral-text)");
  if (won && puzzleIdx < PUZZLES.length - 1) {
    const nb = document.createElement("button");
    nb.textContent = "Next puzzle"; nb.className = "btn-next";
    nb.addEventListener("click", () => { score = 0; initPuzzle(puzzleIdx + 1); });
    btnRow.appendChild(nb);
  }
  const rb = document.createElement("button");
  rb.textContent = "Restart"; rb.className = "btn-restart";
  rb.addEventListener("click", () => { score = 0; initPuzzle(puzzleIdx); });
  btnRow.appendChild(rb);
}
</script>
</body>
</html>
