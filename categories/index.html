<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 5 Connections</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ed;
    --surface: #ffffff;
    --border: #ddd8d0;
    --text: #1e1b18;
    --muted: #7a7570;

    --purple-bg: #edeafc; --purple-border: #7060d8; --purple-text: #3a2c9a;
    --teal-bg:   #d8f4ea; --teal-border:   #1a9e6a; --teal-text:   #084d32;
    --amber-bg:  #fdf0d0; --amber-border:  #d09010; --amber-text:  #624200;
    --coral-bg:  #fce8e0; --coral-border:  #d84820; --coral-text:  #6e1e08;
    --green-bg:  #e4f2d4; --green-border:  #58a010; --green-text:  #244800;
    --blue-bg:   #dceefa; --blue-border:   #2070c8; --blue-text:   #06305e;
  }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  header { text-align: center; margin-bottom: 1.4rem; }
  header h1 { font-size: 1.8rem; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
  header p  { font-size: 0.9rem; color: var(--muted); margin-top: 4px; }

  .badge {
    display: inline-block;
    background: var(--purple-bg); color: var(--purple-text);
    border: 1px solid var(--purple-border);
    border-radius: 20px; font-size: 0.72rem; font-weight: 700;
    padding: 2px 10px; margin-bottom: 6px; letter-spacing: 0.6px; text-transform: uppercase;
  }

  #game-area { width: 100%; max-width: 540px; }

  .puzzle-tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 1.2rem; }
  .tab {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface);
    font-size: 0.78rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: all 0.15s; font-family: inherit;
  }
  .tab.active { background: var(--purple-bg); border-color: var(--purple-border); color: var(--purple-text); }
  .tab.done   { background: var(--teal-bg);   border-color: var(--teal-border);   color: var(--teal-text); }
  .tab:hover  { border-color: var(--purple-border); }

  #status-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; flex-wrap: wrap; gap: 6px;
  }
  #score-display { font-size: 0.82rem; color: var(--muted); font-weight: 600; }
  #score-display span { color: var(--text); font-weight: 700; }
  #mistakes-area { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--muted); font-weight: 600; }
  .dot { width: 12px; height: 12px; border-radius: 50%; background: #d84820; display: inline-block; transition: background 0.3s, transform 0.3s; }
  .dot.used { background: var(--border); transform: scale(0.8); }

  #solved-area { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .solved-row { border-radius: 10px; padding: 11px 14px; border: 1.5px solid; animation: popIn 0.25s ease; }
  .solved-row .cat-name  { font-weight: 700; font-size: 0.9rem; }
  .solved-row .cat-items { font-size: 0.78rem; opacity: 0.8; margin-top: 2px; }

  @keyframes popIn {
    from { transform: scale(0.93); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 7px; margin-bottom: 12px;
  }

  .card {
    background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 8px 4px; min-height: 54px;
    display: flex; align-items: center; justify-content: center;
    text-align: center; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; color: var(--text); line-height: 1.3;
    transition: transform 0.1s, background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .card:hover    { transform: translateY(-2px); border-color: #a090e0; }
  .card:active   { transform: scale(0.96); }
  .card.selected { background: #dcd6f8; border-color: var(--purple-border); color: var(--purple-text); }
  .card.shake    { animation: shake 0.38s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%  { transform: translateX(-5px); }
    40%  { transform: translateX(5px); }
    60%  { transform: translateX(-4px); }
    80%  { transform: translateX(4px); }
  }

  #msg { min-height: 20px; font-size: 0.86rem; font-weight: 600; text-align: center; margin-bottom: 10px; }

  #btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  button {
    padding: 8px 16px; font-size: 0.82rem; font-weight: 600; font-family: inherit;
    border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text);
    cursor: pointer; transition: background 0.12s, transform 0.1s;
  }
  button:hover  { background: #ece8e2; }
  button:active { transform: scale(0.97); }

  #btn-submit { background: var(--purple-border); color: #fff; border-color: var(--purple-border); }
  #btn-submit:hover    { background: #5848c0; }
  #btn-submit:disabled { background: var(--border); color: var(--muted); border-color: var(--border); cursor: default; transform: none; }

  .btn-next    { background: var(--teal-bg);  color: var(--teal-text);  border-color: var(--teal-border); }
  .btn-restart { background: var(--amber-bg); color: var(--amber-text); border-color: var(--amber-border); }
  .btn-next:hover    { background: #afe8cc; }
  .btn-restart:hover { background: #f8e4a0; }

  #loading { text-align: center; color: var(--muted); font-size: 0.9rem; padding: 2rem 0; }
  #error   { text-align: center; color: var(--coral-text); font-size: 0.88rem; padding: 2rem 0; line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="badge">Grade 5</div>
  <h1>Connections</h1>
  <p>Find 4 groups of 5 words that belong together!</p>
</header>

<div class="puzzle-tabs" id="puzzle-tabs"></div>

<div id="game-area">
  <div id="loading">Loading puzzles...</div>
</div>

<script>
const COLORS = {
  purple: { bg: "var(--purple-bg)", border: "var(--purple-border)", text: "var(--purple-text)" },
  teal:   { bg: "var(--teal-bg)",   border: "var(--teal-border)",   text: "var(--teal-text)"   },
  amber:  { bg: "var(--amber-bg)",  border: "var(--amber-border)",  text: "var(--amber-text)"  },
  coral:  { bg: "var(--coral-bg)",  border: "var(--coral-border)",  text: "var(--coral-text)"  },
  green:  { bg: "var(--green-bg)",  border: "var(--green-border)",  text: "var(--green-text)"  },
  blue:   { bg: "var(--blue-bg)",   border: "var(--blue-border)",   text: "var(--blue-text)"   },
};

let PUZZLES = [];
let puzzleIdx = 0, cards = [], selected = [], solvedCats = [];
let mistakes = 4, score = 0, gameOver = false;
const completedPuzzles = new Set();

fetch("puzzles.json")
  .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(data => { PUZZLES = data; buildGameUI(); initPuzzle(0); })
  .catch(err => {
    document.getElementById("game-area").innerHTML =
      `<div id="error"><strong>Could not load puzzles.json</strong><br><small>${err.message}</small><br><br>
       Make sure <code>puzzles.json</code> is in the same folder as this HTML file,<br>
       and open via a local server (or use VS Code Live Server).</div>`;
  });

function buildGameUI() {
  document.getElementById("game-area").innerHTML = `
    <div id="status-row">
      <div id="score-display">Score: <span id="score">0</span></div>
      <div id="mistakes-area">
        Mistakes left:
        <span class="dot" id="d0"></span><span class="dot" id="d1"></span>
        <span class="dot" id="d2"></span><span class="dot" id="d3"></span>
      </div>
    </div>
    <div id="solved-area"></div>
    <div id="grid"></div>
    <div id="msg"></div>
    <div id="btn-row">
      <button id="btn-shuffle">Shuffle</button>
      <button id="btn-deselect">Clear</button>
      <button id="btn-submit" disabled>Submit (0/5)</button>
    </div>`;
  document.getElementById("btn-deselect").addEventListener("click", () => { selected = []; render(); });
  document.getElementById("btn-shuffle").addEventListener("click", () => {
    const unsolved = cards.filter(c => !solvedCats.includes(c.cat));
    cards = [...cards.filter(c => solvedCats.includes(c.cat)), ...shuffle(unsolved)];
    render();
  });
  document.getElementById("btn-submit").addEventListener("click", submitGuess);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initPuzzle(idx) {
  puzzleIdx = idx; selected = []; solvedCats = [];
  mistakes = 4; gameOver = false;
  cards = shuffle(PUZZLES[idx].categories.flatMap(c => c.items.map(item => ({ item, cat: c }))));
  renderTabs(); render();
}

function renderTabs() {
  const tabs = document.getElementById("puzzle-tabs");
  tabs.innerHTML = "";
  PUZZLES.forEach((_, i) => {
    const t = document.createElement("button");
    t.className = "tab" + (i === puzzleIdx ? " active" : "") + (completedPuzzles.has(i) && i !== puzzleIdx ? " done" : "");
    t.textContent = i + 1;
    t.addEventListener("click", () => { score = 0; initPuzzle(i); });
    tabs.appendChild(t);
  });
}

function render() {
  document.getElementById("score").textContent = score;
  for (let i = 0; i < 4; i++) {
    const d = document.getElementById("d" + i);
    if (d) d.className = "dot" + (i >= mistakes ? " used" : "");
  }

  const solvedArea = document.getElementById("solved-area");
  solvedArea.innerHTML = "";
  solvedCats.forEach(cat => {
    const c = COLORS[cat.color] || COLORS.purple;
    const row = document.createElement("div");
    row.className = "solved-row";
    row.style.background = c.bg;
    row.style.borderColor = c.border;
    row.style.color = c.text;
    row.innerHTML = `<div class="cat-name">${cat.name}</div><div class="cat-items">${cat.items.join(" \u00b7 ")}</div>`;
    solvedArea.appendChild(row);
  });

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  cards.filter(c => !solvedCats.includes(c.cat)).forEach(({ item }) => {
    const card = document.createElement("div");
    card.className = "card" + (selected.includes(item) ? " selected" : "");
    card.textContent = item;
    card.addEventListener("click", () => toggleSelect(item));
    grid.appendChild(card);
  });

  const btn = document.getElementById("btn-submit");
  btn.disabled = selected.length !== 5 || gameOver;
  btn.textContent = "Submit (" + selected.length + "/5)";
}

function toggleSelect(item) {
  if (gameOver) return;
  if (selected.includes(item)) {
    selected = selected.filter(s => s !== item);
  } else if (selected.length < 5) {
    selected.push(item);
  } else {
    flashMsg("Select exactly 5 words.", "var(--coral-text)");
    return;
  }
  render();
}

function submitGuess() {
  if (selected.length !== 5 || gameOver) return;
  const cats = selected.map(item => cards.find(c => c.item === item).cat);
  const allSame = cats.every(c => c === cats[0]);

  if (allSame) {
    solvedCats.push(cats[0]);
    score += mistakes === 4 ? 3 : mistakes >= 2 ? 2 : 1;
    selected = [];
    flashMsg("Correct! " + cats[0].name, "var(--teal-text)");
    render();
    if (solvedCats.length === PUZZLES[puzzleIdx].categories.length) setTimeout(() => endGame(true), 350);
  } else {
    const counts = cats.reduce((m, c) => { m[c.name] = (m[c.name] || 0) + 1; return m; }, {});
    const close = Object.values(counts).some(v => v === 4);
    mistakes--;
    document.querySelectorAll(".card.selected").forEach(el => {
      el.classList.add("shake");
      setTimeout(() => el.classList.remove("shake"), 400);
    });
    selected = [];
    flashMsg(
      close ? "So close \u2014 one away! Try again." : "Not quite! " + mistakes + " mistake" + (mistakes !== 1 ? "s" : "") + " left.",
      close ? "var(--amber-text)" : "var(--coral-text)"
    );
    if (mistakes === 0) { setTimeout(() => endGame(false), 450); } else { render(); }
  }
}

function flashMsg(txt, color) {
  const el = document.getElementById("msg");
  el.textContent = txt;
  el.style.color = color || "var(--muted)";
}

function endGame(won) {
  gameOver = true;
  if (won) completedPuzzles.add(puzzleIdx);
  PUZZLES[puzzleIdx].categories.filter(c => !solvedCats.includes(c)).forEach(c => solvedCats.push(c));
  render(); renderTabs();
  const btnRow = document.getElementById("btn-row");
  btnRow.querySelectorAll(".btn-next, .btn-restart").forEach(b => b.remove());
  flashMsg(won ? "Great job! Score: " + score + " pts" : "Game over! Score: " + score + " pts",
           won ? "var(--teal-text)" : "var(--coral-text)");
  if (won && puzzleIdx < PUZZLES.length - 1) {
    const nb = document.createElement("button");
    nb.textContent = "Next puzzle"; nb.className = "btn-next";
    nb.addEventListener("click", () => { score = 0; initPuzzle(puzzleIdx + 1); });
    btnRow.appendChild(nb);
  }
  const rb = document.createElement("button");
  rb.textContent = "Restart"; rb.className = "btn-restart";
  rb.addEventListener("click", () => { score = 0; initPuzzle(puzzleIdx); });
  btnRow.appendChild(rb);
}
</script>
</body>
</html>
